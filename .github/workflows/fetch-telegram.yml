name: Fetch Telegram Channel Subscriptions

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Fetch latest subscription links from Telegram
        id: fetch_links
        run: |
          python - << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          import re
          import time
          import sys
          import signal

          CHANNEL = 'NamazVPN'
          LIMIT = 250
          MAX_PAGES = 50
          BASE_URL = f'https://t.me/s/{CHANNEL}'

          def timeout_handler(signum, frame):
              print("Script timeout (3 minutes)", file=sys.stderr)
              sys.exit(1)

          signal.signal(signal.SIGALRM, timeout_handler)
          signal.alarm(300)

          def extract_links(text):
              pattern = r'(https?://[^\s<>"\'()]+|vless://[^\s<>"\'()]+|vmess://[^\s<>"\'()]+|ss://[^\s<>"\'()]+|ssr://[^\s<>"\'()]+|trojan://[^\s<>"\'()]+)'
              return re.findall(pattern, text, re.IGNORECASE)

          def get_subscription_links(limit):
              all_links = []
              url = BASE_URL
              session = requests.Session()
              session.headers.update({
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
              })

              page_count = 0
              new_links_found = True
              while len(all_links) < limit and url and page_count < MAX_PAGES and new_links_found:
                  page_count += 1
                  print(f'[DEBUG] Page {page_count}: {url}', file=sys.stderr)

                  try:
                      resp = session.get(url, timeout=15)
                      resp.raise_for_status()
                  except Exception as e:
                      print(f'Error fetching page: {e}', file=sys.stderr)
                      break

                  soup = BeautifulSoup(resp.text, 'html.parser')
                  messages = soup.find_all('div', class_='tgme_widget_message')
                  if not messages:
                      messages = soup.find_all('div', class_='tgme_widget_message_wrap')

                  print(f'[DEBUG] Found {len(messages)} messages on page {page_count}', file=sys.stderr)

                  prev_count = len(all_links)
                  for msg in messages:
                      text_elem = msg.find('div', class_='tgme_widget_message_text')
                      if not text_elem:
                          continue
                      text = text_elem.get_text(strip=True)
                      links = extract_links(text)
                      for link in links:
                          if link not in all_links:
                              all_links.append(link)
                              if len(all_links) >= limit:
                                  break
                      if len(all_links) >= limit:
                          break

                  print(f'[DEBUG] Total links so far: {len(all_links)}', file=sys.stderr)

                  if len(all_links) == prev_count:
                      new_links_found = False
                      print('[DEBUG] No new links found on this page, stopping.', file=sys.stderr)
                      break

                  next_url = None
                  next_elem = soup.find('div', class_='tgme_widget_message_bubble')
                  if next_elem and next_elem.get('data-next'):
                      next_val = next_elem['data-next']
                      next_url = f'{BASE_URL}?before={next_val}'
                      print(f'[DEBUG] Found data-next: {next_val}', file=sys.stderr)

                  if not next_url:
                      more = soup.find('a', class_='tme_messages_more')
                      if more and more.get('href'):
                          next_url = 'https://t.me' + more['href']
                          print(f'[DEBUG] Found tme_messages_more: {more["href"]}', file=sys.stderr)

                  if not next_url:
                      last_msg = soup.find('div', class_='tgme_widget_message')
                      if last_msg and last_msg.get('data-post'):
                          post_id = last_msg['data-post'].split('/')[-1]
                          next_url = f'{BASE_URL}?before={post_id}'
                          print(f'[DEBUG] Found data-post: {last_msg["data-post"]}', file=sys.stderr)

                  if not next_url:
                      print('[DEBUG] No next page found, stopping.', file=sys.stderr)
                      break

                  url = next_url
                  time.sleep(2)

              if page_count >= MAX_PAGES:
                  print(f'[DEBUG] Reached max pages ({MAX_PAGES}), stopping.', file=sys.stderr)

              if not new_links_found:
                  print('[DEBUG] Stopped because no new links were found.', file=sys.stderr)

              return all_links[:limit]

          links = get_subscription_links(LIMIT)
          if not links:
              print('No subscription links found!', file=sys.stderr)
              sys.exit(1)

          
          cleaned_links = []
          for link in links:
              link = link.replace('NamazVPN', 'PEZHMAN')
              link = re.sub(r'\|?@NamazProxy', '', link)
              cleaned_links.append(link)

          with open('sub.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(cleaned_links))

          print(f'Successfully fetched {len(cleaned_links)} links.')
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add sub.txt
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update subscription links from Telegram [skip ci]"
          git pull origin main --ff-only
          git push origin main
